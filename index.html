<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solace v48.8 | Cloud Stable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --sol-bg: #000; --sol-sidebar: #0a0a0a; --sol-card: #111; --sol-red: #ff0000; }
        body { background: var(--sol-bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* Navigation & Layout */
        .sidebar { width: 260px; height: 100vh; background: var(--sol-sidebar); position: fixed; border-right: 1px solid #222; transition: 0.2s; z-index: 2000; }
        .sidebar.collapsed { width: 0; overflow: hidden; border: none; }
        .main-panel { margin-left: 260px; padding: 30px; transition: 0.2s; }
        .sidebar.collapsed ~ .main-panel { margin-left: 0; }

        .nav-link { color: #888; padding: 14px 25px; border: none; background: none; width: 100%; text-align: left; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .nav-link:hover { color: #fff; background: #1a1a1a; }
        .nav-link.active { color: var(--sol-red); background: #151515; border-left: 4px solid var(--sol-red); font-weight: bold; }

        /* UI Components */
        .sol-card { background: var(--sol-card); border: 1px solid #222; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .sol-input { background: #000 !important; border: 1px solid #333 !important; color: #fff !important; }
        .btn-red { background: var(--sol-red); color: #fff; border: none; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        #login-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .top-ui { position: fixed; top: 15px; right: 20px; z-index: 2500; display: flex; gap: 10px; }
        .pointer { cursor: pointer; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div style="width: 320px; text-align: center; background: #0a0a0a; padding: 40px; border: 1px solid #222; border-radius: 15px;">
        <h2 style="color:var(--sol-red); letter-spacing: 5px; font-weight: 900;">SOLACE</h2>
        <p class="text-muted small mb-4">V48.8 CLOUD TERMINAL</p>
        <input type="text" id="u-in" class="form-control sol-input mb-2 text-center" placeholder="USERNAME">
        <input type="password" id="p-in" class="form-control sol-input mb-3 text-center" placeholder="PASSWORD">
        <button class="btn btn-red w-100" onclick="window.solaceLogin()">INITIALIZE</button>
    </div>
</div>

<div class="top-ui" id="ui-controls" style="display:none">
    <div class="badge bg-danger p-2 px-3" id="user-tag"></div>
    <button class="btn btn-dark border-secondary" onclick="window.toggleSidebar()"><i class="bi bi-list"></i></button>
</div>

<div class="sidebar" id="sol-sidebar" style="display:none">
    <div class="p-4 mb-3"><h4 class="text-danger fw-bold m-0">SOLACE</h4></div>
    <div class="nav flex-column">
        <button class="nav-link active" onclick="window.gotoTab('tab-pro', this)"><i class="bi bi-grid"></i> Projects</button>
        <button class="nav-link" onclick="window.gotoTab('tab-inv', this)"><i class="bi bi-box"></i> Inventory</button>
        <button class="nav-link" onclick="window.gotoTab('tab-fin', this)"><i class="bi bi-cash-stack"></i> Finance</button>
        <button class="nav-link" onclick="window.gotoTab('tab-cust', this)"><i class="bi bi-people"></i> Clients</button>
        <button class="nav-link text-danger mt-5" onclick="location.reload()"><i class="bi bi-power"></i> Logout</button>
    </div>
</div>

<div class="main-panel" id="sol-main" style="display:none">
    <h3 class="fw-bold mb-4" id="view-title">PROJECTS</h3>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-pro">
            <div class="sol-card"><div class="row g-2">
                <div class="col-md-4"><input type="text" id="p-n" class="form-control sol-input" placeholder="Client Name"></div>
                <div class="col-md-4"><input type="text" id="p-l" class="form-control sol-input" placeholder="Location"></div>
                <div class="col-md-4"><button class="btn btn-red w-100" onclick="window.addData('projects')">Create Project</button></div>
            </div></div>
            <div class="sol-card p-0 overflow-hidden"><table class="table table-dark m-0"><thead><tr><th>Client</th><th>Location</th><th>Action</th></tr></thead><tbody id="list-pro"></tbody></table></div>
        </div>

        <div class="tab-pane fade" id="tab-inv">
            <div class="sol-card"><div class="row g-2">
                <div class="col-md-8"><input type="text" id="i-n" class="form-control sol-input" placeholder="Item Description"></div>
                <div class="col-md-2"><input type="number" id="i-q" class="form-control sol-input" placeholder="Qty"></div>
                <div class="col-md-2"><button class="btn btn-red w-100" onclick="window.addData('inventory')">Add</button></div>
            </div></div>
            <div class="sol-card p-0"><table class="table table-dark m-0"><thead><tr><th>Item</th><th>Qty</th><th>Action</th></tr></thead><tbody id="list-inv"></tbody></table></div>
        </div>

        <div class="tab-pane fade" id="tab-fin">
            <div class="sol-card"><div class="row g-2">
                <div class="col-md-7"><input type="text" id="f-d" class="form-control sol-input" placeholder="Expense Detail"></div>
                <div class="col-md-3"><input type="number" id="f-a" class="form-control sol-input" placeholder="Amount"></div>
                <div class="col-md-2"><button class="btn btn-red w-100" onclick="window.addData('finance')">Save</button></div>
            </div></div>
            <div class="sol-card p-0">
                <table class="table table-dark m-0"><thead><tr><th>Description</th><th>Amount</th><th>Action</th></tr></thead><tbody id="list-fin"></tbody></table>
                <div class="p-3 bg-black text-end"><h4 id="fin-total" class="m-0 text-danger fw-bold">₹0</h4></div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-cust">
            <div class="sol-card"><div class="row g-2">
                <div class="col-md-10"><input type="text" id="c-n" class="form-control sol-input" placeholder="Full Name / Company"></div>
                <div class="col-md-2"><button class="btn btn-red w-100" onclick="window.addData('customers')">Register</button></div>
            </div></div>
            <div class="sol-card p-0"><table class="table table-dark m-0"><thead><tr><th>Name</th><th>Action</th></tr></thead><tbody id="list-cust"></tbody></table></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCIJpuucTWRw2U8xNmLp3gkOw-fzgTeh5I",
        authDomain: "solace-2c588.firebaseapp.com",
        databaseURL: "https://solace-2c588-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "solace-2c588",
        storageBucket: "solace-2c588.firebasestorage.app",
        messagingSenderId: "392117139934",
        appId: "1:392117139934:web:9bb796d66af5ae8bbec54f",
        measurementId: "G-D3N8NPRJV1"
    };

    const app = initializeApp(firebaseConfig);
    const dbCloud = getDatabase(app);
    const dataRef = ref(dbCloud, 'solace_v2');

    // Global Database State
    window.localDB = { projects: [], inventory: [], finance: [], customers: [], users: [{u:'taksheel', p:'tvsk2009@'}] };

    // --- FORCED GLOBAL FUNCTIONS (CLICKABLE FIX) ---
    
    window.gotoTab = (id, btn) => {
        // Hide all tabs
        document.querySelectorAll('.tab-pane').forEach(t => { t.classList.remove('show', 'active'); });
        document.querySelectorAll('.nav-link').forEach(l => { l.classList.remove('active'); });
        
        // Show target
        const target = document.getElementById(id);
        if(target) {
            target.classList.add('show', 'active');
            btn.classList.add('active');
            document.getElementById('view-title').innerText = btn.innerText.trim().toUpperCase();
        }
    };

    window.toggleSidebar = () => {
        document.getElementById('sol-sidebar').classList.toggle('collapsed');
    };

    window.solaceLogin = () => {
        const u = document.getElementById('u-in').value;
        const p = document.getElementById('p-in').value;
        const user = window.localDB.users.find(x => x.u === u && x.p === p);
        
        if(user) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('sol-sidebar').style.display = 'block';
            document.getElementById('sol-main').style.display = 'block';
            document.getElementById('ui-controls').style.display = 'flex';
            document.getElementById('user-tag').innerText = user.u.toUpperCase();
            renderUI();
        } else {
            alert("ACCESS DENIED");
        }
    };

    window.addData = (type) => {
        const id = Date.now();
        if(type==='projects') window.localDB.projects.push({id, n: document.getElementById('p-n').value, l: document.getElementById('p-l').value});
        if(type==='inventory') window.localDB.inventory.push({id, n: document.getElementById('i-n').value, q: document.getElementById('i-q').value});
        if(type==='finance') window.localDB.finance.push({id, d: document.getElementById('f-d').value, a: parseFloat(document.getElementById('f-a').value)});
        if(type==='customers') window.localDB.customers.push({id, n: document.getElementById('c-n').value});
        
        set(dataRef, window.localDB); // Sync to Cloud
    };

    window.removeData = (type, id) => {
        window.localDB[type] = window.localDB[type].filter(x => x.id !== id);
        set(dataRef, window.localDB);
    };

    // --- RE-RENDER ENGINE ---
    function renderUI() {
        // Projects
        document.getElementById('list-pro').innerHTML = (window.localDB.projects || []).map(x => `
            <tr><td>${x.n}</td><td>${x.l}</td><td><i class="bi bi-trash text-danger pointer" onclick="window.removeData('projects',${x.id})"></i></td></tr>
        `).join('');

        // Inventory
        document.getElementById('list-inv').innerHTML = (window.localDB.inventory || []).map(x => `
            <tr><td>${x.n}</td><td>${x.q}</td><td><i class="bi bi-trash text-danger pointer" onclick="window.removeData('inventory',${x.id})"></i></td></tr>
        `).join('');

        // Finance
        let total = 0;
        document.getElementById('list-fin').innerHTML = (window.localDB.finance || []).map(x => {
            total += x.a;
            return `<tr><td>${x.d}</td><td class="text-danger">₹${x.a}</td><td><i class="bi bi-trash text-danger pointer" onclick="window.removeData('finance',${x.id})"></i></td></tr>`;
        }).join('');
        document.getElementById('fin-total').innerText = "₹" + total;

        // Customers
        document.getElementById('list-cust').innerHTML = (window.localDB.customers || []).map(x => `
            <tr><td>${x.n}</td><td><i class="bi bi-trash text-danger pointer" onclick="window.removeData('customers',${x.id})"></i></td></tr>
        `).join('');
    }

    // Cloud Listener
    onValue(dataRef, (snap) => {
        const val = snap.val();
        if(val) {
            window.localDB = val;
            renderUI();
        }
    });

</script>
</body>
</html>
